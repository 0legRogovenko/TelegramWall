services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telegramwall
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d telegramwall"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/telegramwall
    ports:
      - "${FLASK_PORT:-5001}:5001"
    volumes:
      - ./sessions:/app/sessions

volumes:
  postgres_data:
