services:
  - type: web
    name: telegramwall
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false        # set to https://<your-app>.onrender.com
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        sync: false        # Supabase transaction pooler URL
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_PORT
        value: "5001"
