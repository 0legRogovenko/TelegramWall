name: Bot

# Runs the bot in polling mode.
# concurrency: cancel-in-progress ensures only one instance runs at a time —
# a new push or cron fires, kills the previous instance, then starts fresh.
#
# The cron interval MUST stay well below timeout-minutes. GitHub delays or drops
# scheduled runs under load (observed here: up to 2h late, and whole ticks
# skipped). When the interval equalled the timeout, every such delay was a
# minute-for-minute outage — the old job had already died when the late tick
# arrived. Restarting every 2h against a ~5.8h timeout means the bot only goes
# down if roughly three ticks in a row are lost.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */2 * * *"   # restart every 2 hours — see note above
  workflow_dispatch:         # manual trigger from GitHub UI

concurrency:
  group: bot-instance
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # ~5.8h — just under GitHub's 6-hour job limit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start bot (polling mode)
        # TELEGRAM_WEBHOOK_URL is intentionally absent → polling mode
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_API_ID:          ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:        ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE:           ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_SESSION_STRING:  ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_ADMIN_IDS:       ${{ secrets.TELEGRAM_ADMIN_IDS }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          YOOKASSA_PROVIDER_TOKEN:  ${{ secrets.YOOKASSA_PROVIDER_TOKEN }}
          FLASK_PORT:               "5001"
        run: python main.py
