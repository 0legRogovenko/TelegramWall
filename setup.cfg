[flake8]
max-line-length = 99
# E231 false-positives on f-string format specifiers like {var:02d}
# E221/E222 false-positives on intentional alignment inside string literals
extend-ignore = E231,E221,E222
per-file-ignores =
    # noqa not needed in these files — they're intentionally formatted
    src/bot/handlers.py:E501

[tool:pytest]
asyncio_mode = auto
